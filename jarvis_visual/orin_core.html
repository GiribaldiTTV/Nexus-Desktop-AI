<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jarvis Core</title>
  <link rel="stylesheet" href="jarvis_core.css" />
</head>
<body>
  <div id="scene">
    <canvas id="fx-back"></canvas>
    <canvas id="fx-front"></canvas>

    <div id="vignette"></div>
    <div id="far-haze"></div>
    <div id="halo"></div>
    <div id="pulse"></div>
    <div id="center-glow"></div>
    <div id="ignition-flare"></div>
    <div id="scanline"></div>
    <div id="scan-wedge"></div>
    <div id="turbulence"></div>
    <div id="front-bloom"></div>

    <div id="core-wrap">
      <div class="ring ring-outer"></div>
      <div class="ring ring-outer-fragments"></div>
      <div class="ring ring-mid"></div>
      <div class="ring ring-mid-fragments"></div>
      <div class="ring ring-inner"></div>
      <div class="ring ring-grid"></div>
      <div class="ring ring-ticks"></div>
      <div class="ring ring-energy"></div>
      <div class="ring ring-shell-broken"></div>
      <div class="ring ring-front-ghost"></div>
      <div id="core"></div>
      <div id="core-dot"></div>
    </div>
  </div>

  <script src="jarvis_core.js"></script>
</body>
</html>
